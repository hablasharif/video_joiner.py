name: Video Merge

on:
  workflow_dispatch:
  push:
    paths:
      - "**.py"
      - "**.mp4"
      - "**.mkv"
      - "**.mov"
      - "**.avi"

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      # 4. Install Python dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tqdm

      # 5. Run your script
      - name: Run Video Joiner
        run: |
          python join_videos.py

      # 6. Upload output file
      - name: Upload merged video
        uses: actions/upload-artifact@v4
        with:
          name: merged-video
          path: merged_output.mp4
