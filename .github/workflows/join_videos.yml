name: Auto Join Videos

on:
  push:
    paths:
      - '**.mp4'
      - '**.mov'
      - '**.avi'
      - '**.mkv'
      - 'video_list.txt'
  workflow_dispatch:
    inputs:
      transition:
        description: 'Transition: fade / crossfade / wipe / none'
        required: false
        default: 'fade'
      quality:
        description: 'Quality: high / medium / low'
        required: false
        default: 'high'
      output_name:
        description: 'Output filename (no extension)'
        required: false
        default: 'merged_output'

jobs:
  join-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install rich

      - name: Run Video Joiner
        env:
          TRANSITION:  ${{ github.event.inputs.transition  || 'fade'          }}
          QUALITY:     ${{ github.event.inputs.quality     || 'high'          }}
          OUTPUT_NAME: ${{ github.event.inputs.output_name || 'merged_output' }}
        run: python join_videos.py

      - name: Upload merged video
        uses: actions/upload-artifact@v4
        with:
          name: merged-video-${{ github.run_number }}
          path: merged/*.mp4
          retention-days: 7
