name: Drive Video Merge (Rclone)

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Install tools ───
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl
          curl https://rclone.org/install.sh | sudo bash

      # ─── Setup rclone ───
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
[gdrive]
type = drive
scope = drive.readonly
EOF

      # ─── Download folder ───
      - name: Download Google Drive folder
        run: |
          mkdir videos
          rclone copy gdrive:"1EItMceBqNykGiynxkJdWRNZfaucWYl8Z" videos \
            --drive-shared-with-me

      # ─── Run script ───
      - name: Merge videos
        run: python join_videos.py

      # ─── Upload result ───
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: merged-result
          path: |
            merged_output.mp4
            timestamps.txt
