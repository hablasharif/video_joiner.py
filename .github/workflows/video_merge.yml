name: Google Drive Video Merge (Rclone)

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg + rclone
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          # We use a secret called RCLONE_CONFIG_DATA which should contain 
          # the full content of a working rclone.conf file
          echo "${{ secrets.RCLONE_CONFIG_DATA }}" > ~/.config/rclone/rclone.conf

      - name: Download videos from Google Drive
        run: |
          mkdir -p videos
          # Using the ID provided in your snippet
          rclone copy "gdrive:{"1EItMceBqNykGiynxkJdWRNZfaucWYl8Z"}" ./videos \
            --drive-shared-with-me \
            --include "*.{mp4,mkv,mov,avi}" \
            --progress

      - name: Install Python dependencies
        run: |
          pip install tqdm

      - name: Run video joiner
        run: python join_videos.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: merged-video
          path: |
            merged_output.mp4
            timestamps.txt
